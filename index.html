        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

        .card h3 { color: #333; margin: 10px 0; }
        .price { font-size: 1.5rem; font-weight: bold; color: #d32f2f; margin: 10px 0; }
        .btn { background: #25d366; color: white; padding: 12px 25px; text-decoration: none; display: inline-block; border-radius: 25px; font-weight: bold; }
        .btn:hover { background: #128c7e; }
    </style>
</head>

            <div class="card">

            </div>

    </div>

</body>
</html>
